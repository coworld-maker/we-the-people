name: Daily Data Sync

on:
  schedule:
    # Runs every day at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

# Cancel any in-progress run when a new one is triggered. Prevents
# back-to-back manual catch-up clicks from piling up identical work.
concurrency:
  group: data-sync
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────
  # Each sync target is its own parallel job. Previously the
  # /api/cron/sync orchestrator called all four sequentially, which
  # exceeded Vercel's 300s serverless ceiling and returned 504.
  # Splitting them gives each its own budget AND lets all four run
  # at once. Each curl --max-time 480 covers Vercel's max+buffer.
  #
  # Note on `session`: the 119th Congress has two sessions:
  #   Session 1: Jan 3, 2025 → Jan 3, 2026
  #   Session 2: Jan 3, 2026 → Jan 3, 2027 (current)
  # We sync both each run so the workflow stays correct across the
  # session boundary without code changes. Session-2 fires first
  # because it's where the freshest votes live.
  # ─────────────────────────────────────────────────────────────

  sync-bills:
    name: Sync recent bills
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST /api/sync-bills
        run: |
          response=$(curl -s -o /tmp/body -w "%{http_code}" \
            --max-time 480 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"congress": 119, "limit": 50, "offset": 0}' \
            "https://www.democracyunlocked.com/api/sync-bills")
          echo "Response code: $response"
          cat /tmp/body 2>/dev/null
          echo
          [ "$response" = "200" ] || exit 1

  sync-representatives:
    name: Refresh representatives
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST /api/sync-representatives
        run: |
          response=$(curl -s -o /tmp/body -w "%{http_code}" \
            --max-time 480 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "https://www.democracyunlocked.com/api/sync-representatives")
          echo "Response code: $response"
          cat /tmp/body 2>/dev/null
          echo
          [ "$response" = "200" ] || exit 1

  sync-house-votes-s2:
    name: Sync House roll-calls (current session)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST /api/sync-congress-votes (house, session 2)
        run: |
          response=$(curl -s -o /tmp/body -w "%{http_code}" \
            --max-time 480 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"congress": 119, "session": 2, "chamber": "house", "maxVotes": 10}' \
            "https://www.democracyunlocked.com/api/sync-congress-votes")
          echo "Response code: $response"
          cat /tmp/body 2>/dev/null
          echo
          [ "$response" = "200" ] || exit 1

  sync-house-votes-s1:
    name: Sync House roll-calls (prior session)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST /api/sync-congress-votes (house, session 1)
        run: |
          response=$(curl -s -o /tmp/body -w "%{http_code}" \
            --max-time 480 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"congress": 119, "session": 1, "chamber": "house", "maxVotes": 10}' \
            "https://www.democracyunlocked.com/api/sync-congress-votes")
          echo "Response code: $response"
          cat /tmp/body 2>/dev/null
          echo
          [ "$response" = "200" ] || exit 1

  sync-senate-votes-s2:
    name: Sync Senate roll-calls (current session)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST /api/sync-congress-votes (senate, session 2)
        run: |
          response=$(curl -s -o /tmp/body -w "%{http_code}" \
            --max-time 480 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"congress": 119, "session": 2, "chamber": "senate", "maxVotes": 10}' \
            "https://www.democracyunlocked.com/api/sync-congress-votes")
          echo "Response code: $response"
          cat /tmp/body 2>/dev/null
          echo
          [ "$response" = "200" ] || exit 1

  sync-senate-votes-s1:
    name: Sync Senate roll-calls (prior session)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST /api/sync-congress-votes (senate, session 1)
        run: |
          response=$(curl -s -o /tmp/body -w "%{http_code}" \
            --max-time 480 \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"congress": 119, "session": 1, "chamber": "senate", "maxVotes": 10}' \
            "https://www.democracyunlocked.com/api/sync-congress-votes")
          echo "Response code: $response"
          cat /tmp/body 2>/dev/null
          echo
          [ "$response" = "200" ] || exit 1
